<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事一覧 — SustainaLog</title>
  <meta name="description" content="国内企業のCSR・サステナビリティ活動の記事一覧。テーマ・業界・企業で絞り込めます。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:title" content="記事一覧 — SustainaLog">
  <meta property="og:description" content="国内企業のCSR・サステナビリティ活動の記事一覧。テーマ・業界・企業で絞り込めます。">
  <meta property="og:site_name" content="SustainaLog">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="style.css">
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</head>
<body>

<div id="header-mount"></div>

<div class="page-hero">
  <div class="container">
    <p class="page-hero-label">Articles</p>
    <h1>記事一覧</h1>
    <p>国内上場企業のCSR・サステナビリティ・社会貢献活動の最新情報をお届けします。</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" class="search-input" placeholder="企業名・テーマで検索..." id="searchInput" oninput="filterArticles()">
      </div>
      <p id="result-count" style="font-size:0.84rem;color:var(--ink-300);flex-shrink:0;"></p>
    </div>

    <div style="margin-bottom:12px;">
      <p style="font-size:0.75rem;font-weight:700;letter-spacing:0.1em;color:var(--ink-300);text-transform:uppercase;margin-bottom:8px;">テーマ</p>
      <div class="filter-bar" id="theme-filters">
        <button class="filter-btn active" onclick="setThemeFilter('', this)">すべて</button>
        <button class="filter-btn" onclick="setThemeFilter('環境', this)">🌿 環境</button>
        <button class="filter-btn" onclick="setThemeFilter('地域貢献', this)">🏘️ 地域貢献</button>
        <button class="filter-btn" onclick="setThemeFilter('教育支援', this)">🎓 教育支援</button>
        <button class="filter-btn" onclick="setThemeFilter('DEI', this)">🌈 DEI</button>
        <button class="filter-btn" onclick="setThemeFilter('健康経営', this)">💪 健康経営</button>
        <button class="filter-btn" onclick="setThemeFilter('ガバナンス', this)">⚖️ ガバナンス</button>
        <button class="filter-btn" onclick="setThemeFilter('災害支援', this)">🆘 災害支援</button>
      </div>
    </div>

    <div style="margin-bottom:36px;">
      <p style="font-size:0.75rem;font-weight:700;letter-spacing:0.1em;color:var(--ink-300);text-transform:uppercase;margin-bottom:8px;">業界</p>
      <div class="filter-bar" id="industry-filters">
        <button class="filter-btn active" onclick="setIndustryFilter('', this)">すべて</button>
        <button class="filter-btn" onclick="setIndustryFilter('自動車', this)">自動車</button>
        <button class="filter-btn" onclick="setIndustryFilter('電機・精密機器', this)">電機・精密機器</button>
        <button class="filter-btn" onclick="setIndustryFilter('金融・銀行', this)">金融・銀行</button>
        <button class="filter-btn" onclick="setIndustryFilter('通信・IT', this)">通信・IT</button>
        <button class="filter-btn" onclick="setIndustryFilter('食品・飲料', this)">食品・飲料</button>
        <button class="filter-btn" onclick="setIndustryFilter('小売・コンビニ', this)">小売</button>
        <button class="filter-btn" onclick="setIndustryFilter('サービス・HR', this)">サービス</button>
      </div>
    </div>

    <div id="articles-grid">
      <div style="grid-column:1/-1;text-align:center;padding:64px 0;">
        <div style="width:36px;height:36px;border:3px solid var(--ink-100);border-top-color:var(--green-500);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div>
        <p style="color:var(--ink-300);font-size:.88rem;">記事を読み込み中...</p>
      </div>
    </div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-state-icon">🌱</div>
      <h3>記事が見つかりませんでした</h3>
      <p>検索条件を変えてお試しください。</p>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="schema.js"></script>
<script src="dummy-data.js"></script>
<script src="sheets-api.js"></script>
<script src="public-data.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderHeader('articles.html');
document.getElementById('footer-mount').innerHTML = renderFooter();

let activeTheme    = '';
let activeIndustry = '';
let _loaded        = false;

function setThemeFilter(theme, btn) {
  activeTheme = theme;
  document.querySelectorAll('#theme-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterArticles();
}

function setIndustryFilter(industry, btn) {
  activeIndustry = industry;
  document.querySelectorAll('#industry-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterArticles();
}

function filterArticles() {
  if (!_loaded) return;
  const query = (document.getElementById('searchInput').value || '').toLowerCase();
  const all   = getPublicArticles().map(adaptArticleForUI);
  const filtered = all.filter(a => {
    const matchTheme    = !activeTheme    || a.csr_type === activeTheme    || a.csr_subtype === activeTheme;
    const matchIndustry = !activeIndustry || a.industry === activeIndustry;
    const matchQuery    = !query || (a.title||'').toLowerCase().includes(query) || (a.company||'').toLowerCase().includes(query) || (a.summary||'').toLowerCase().includes(query) || (a.csr_type||'').toLowerCase().includes(query) || (a.csr_subtype||'').toLowerCase().includes(query);
    return matchTheme && matchIndustry && matchQuery;
  });
  const grid  = document.getElementById('articles-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');
  count.textContent = `${filtered.length}件の記事`;
  if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; }
  else { empty.style.display = 'none'; grid.className = 'articles-grid'; grid.innerHTML = filtered.map(renderCard).join(''); initScrollAnimations(); }
  const pag = document.getElementById('pagination');
  pag.innerHTML = filtered.length > 9 ? `<button class="page-btn page-btn-arrow">←</button><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn page-btn-arrow">→</button>` : '';
}

(async () => {
  await loadPublicArticles();
  _loaded = true;
  filterArticles();
})();
</script>
</body>
</html>
