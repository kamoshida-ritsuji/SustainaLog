<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分析ダッシュボード — SustainaLog</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes barGrow {
      from { width: 0 !important; }
      to   { }
    }

    /* ─── KPI ─── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 40px;
    }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg);
      padding: 18px 16px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .kpi-num {
      font-family: var(--font-serif);
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 6px;
      color: var(--green-700);
    }
    .kpi-label { font-size: .72rem; color: var(--ink-400); font-weight: 600; letter-spacing: .04em; }
    .kpi-sub   { font-size: .68rem; color: var(--ink-300); margin-top: 3px; }

    /* ─── Chart sections ─── */
    .dash-section { margin-bottom: 44px; }
    .dash-section-title {
      font-size: .72rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--ink-300);
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 1px solid var(--ink-100);
      display: flex; align-items: center; justify-content: space-between;
    }
    .dash-section-badge {
      font-size: .68rem; font-weight: 700; padding: 2px 8px;
      border-radius: 99px; background: var(--green-50); color: var(--green-600);
    }

    /* ─── Bar chart ─── */
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row {
      display: flex; align-items: center; gap: 10px;
    }
    .bar-label {
      font-size: .78rem; color: var(--ink-600); flex-shrink: 0;
      text-align: right; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1; height: 20px; background: var(--ink-50, #fafafa);
      border-radius: 4px; overflow: hidden;
      border: 1px solid var(--ink-100);
    }
    .bar-fill {
      height: 100%; border-radius: 3px;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 6px;
      transition: width .5s cubic-bezier(.22,1,.36,1);
    }
    .bar-fill-num {
      font-family: var(--font-mono); font-size: .68rem;
      font-weight: 700; color: rgba(255,255,255,.9);
      white-space: nowrap;
    }
    .bar-fill.zero { background: var(--ink-100) !important; }
    .bar-fill.zero .bar-fill-num { color: var(--ink-300); }

    /* ─── Monthly chart ─── */
    .monthly-chart {
      display: flex; align-items: flex-end; gap: 6px;
      height: 120px; padding: 0 4px;
    }
    @media (max-width: 560px) { .monthly-chart { height: 90px; gap: 4px; } }
    .month-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
    .month-bar-wrap {
      flex: 1; width: 100%; display: flex; align-items: flex-end;
    }
    .month-bar {
      width: 100%; border-radius: 4px 4px 0 0;
      min-height: 3px;
      transition: height .5s cubic-bezier(.22,1,.36,1);
      cursor: default;
      position: relative;
    }
    .month-bar:hover::after {
      content: attr(data-tooltip);
      position: absolute; bottom: calc(100% + 4px); left: 50%;
      transform: translateX(-50%);
      background: var(--ink-900); color: var(--white);
      font-size: .68rem; padding: 3px 8px; border-radius: 4px;
      white-space: nowrap; pointer-events: none;
    }
    .month-label { font-size: .65rem; color: var(--ink-400); white-space: nowrap; }
    .month-num   { font-family: var(--font-mono); font-size: .65rem; color: var(--ink-400); }

    /* ─── Ranking ─── */
    .ranking-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--ink-100);
      text-decoration: none;
      transition: background var(--transition);
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-item:hover { background: var(--green-50); margin: 0 -16px; padding: 10px 16px; border-radius: var(--radius-md); }
    .rank-num {
      font-family: var(--font-mono); font-size: .78rem; font-weight: 700;
      color: var(--ink-300); width: 22px; text-align: right; flex-shrink: 0;
    }
    .rank-num.top3 { color: var(--green-600); }
    .rank-icon { font-size: 1.2rem; flex-shrink: 0; }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: .88rem; font-weight: 700; color: var(--ink-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-sub  { font-size: .72rem; color: var(--ink-400); }
    .rank-count {
      font-family: var(--font-mono); font-size: .8rem; font-weight: 700;
      color: var(--green-600); background: var(--green-50);
      padding: 3px 9px; border-radius: 99px; flex-shrink: 0;
    }

    /* ─── 2-col layout ─── */
    .dash-cols {
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
      margin-bottom: 44px;
    }
    @media (max-width: 768px) { .dash-cols { grid-template-columns: 1fr; } }

    .dash-card {
      background: var(--white); border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg); padding: 20px 22px;
    }

    /* ─── Score dist ─── */
    .score-dist { display: flex; gap: 6px; align-items: flex-end; height: 80px; }
    .score-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .score-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; }
    .score-bar  {
      width: 100%; border-radius: 3px 3px 0 0; min-height: 2px;
      transition: height .5s cubic-bezier(.22,1,.36,1);
    }
    .score-rank-label { font-family: var(--font-mono); font-size: .72rem; font-weight: 700; }
    .score-count      { font-family: var(--font-mono); font-size: .64rem; color: var(--ink-400); }

    /* ─── Last updated ─── */
    .dash-updated {
      text-align: right; font-size: .72rem; color: var(--ink-300);
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
<div id="header-mount"></div>

<div class="page-hero">
  <div class="container">
    <p class="page-hero-label">Dashboard</p>
    <h1>分析ダッシュボード</h1>
    <p>CSR・サステナビリティ活動のトレンドと企業動向をひと砮で把握できます。</p>
  </div>
</div>

<section class="section">
  <div class="container" id="dash-mount">
    <div style="text-align:center;padding:80px 0;">
      <div style="width:40px;height:40px;border:3px solid var(--ink-100);border-top-color:var(--green-500);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 20px;"></div>
      <p style="color:var(--ink-300);font-size:.9rem;">データを詻袝中...</p>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="schema.js"></script>
<script src="dummy-data.js"></script>
<script src="sheets-api.js"></script>
<script src="public-data.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderHeader('dashboard.html');
document.getElementById('footer-mount').innerHTML = renderFooter();

// ─────────────────────────────────────────────
// Chart helpers
// ─────────────────────────────────────────────

/**
 * 横棒グラフ（シンプル）
 * @param {Array} rows  [{ label, value, color, href }]
 * @param {Object} opts { labelWidth, maxValue, unit, emptyText }
 */
function buildBarChart(rows, opts = {}) {
  const { labelWidth = 120, unit = '件', emptyText = 'データなし' } = opts;
  if (!rows || rows.length === 0) {
    return `<div style="text-align:center;padding:24px;color:var(--ink-300);font-size:.84rem;">${emptyText}</div>`;
  }
  const max = opts.maxValue || Math.max(...rows.map(r => r.value), 1);
  return `<div class="bar-chart">` + rows.map(r => {
    const pct = Math.round((r.value / max) * 100);
    const bg  = r.color || 'var(--green-500)';
    const inner = `
      <div class="bar-row">
        <div class="bar-label" style="width:${labelWidth}px;min-width:${labelWidth}px;">${r.label}</div>
        <div class="bar-track">
          <div class="bar-fill ${r.value === 0 ? 'zero' : ''}"
               style="width:${Math.max(pct,r.value>0?6:0)}%;background:${bg};">
            <span class="bar-fill-num">${r.value > 0 ? r.value + unit : ''}</span>
          </div>
        </div>
      </div>`;
    return r.href ? `<a href="${r.href}" style="text-decoration:none;">${inner}</a>` : inner;
  }).join('') + `</div>`;
}

/**
 * 月別縦棒グラフ
 * @param {Array} months [{ label, value }]
 * @param {string} color
 */
function buildMonthlyChart(months, color = 'var(--green-500)') {
  if (!months || months.length === 0) {
    return `<div style="text-align:center;padding:24px;color:var(--ink-300);font-size:.84rem;">データなし</div>`;
  }
  const max = Math.max(...months.map(m => m.value), 1);
  return `<div class="monthly-chart">` + months.map(m => {
    const h = Math.round((m.value / max) * 100);
    const bg = m.value > 0 ? color : 'var(--ink-100)';
    return `
      <div class="month-col">
        <div class="month-bar-wrap">
          <div class="month-bar" style="height:${Math.max(h,m.value>0?4:2)}%;background:${bg};"
               data-tooltip="${m.label}: ${m.value}件"></div>
        </div>
        <div class="month-label">${m.label}</div>
        <div class="month-num">${m.value}</div>
      </div>`;
  }).join('') + `</div>`;
}

/**
 * スコア分布グラフ
 */
function buildScoreDist(articles) {
  const groups = { S:0, A:0, B:0, C:0, D:0 };
  articles.forEach(a => {
    const s = Number(a.total_score) || 0;
    if (s >= 22) groups.S++;
    else if (s >= 18) groups.A++;
    else if (s >= 13) groups.B++;
    else if (s >= 8)  groups.C++;
    else groups.D++;
  });
  const colors = { S:'#6a1fd1', A:'#1565c0', B:'#2e7d32', C:'#f57c00', D:'#c62828' };
  const max = Math.max(...Object.values(groups), 1);
  return `<div class="score-dist">` +
    Object.entries(groups).map(([r, cnt]) => `
      <div class="score-col">
        <div class="score-bar-wrap">
          <div class="score-bar" style="height:${Math.max(Math.round((cnt/max)*100),cnt>0?8:2)}%;background:${colors[r]};"></div>
        </div>
        <div class="score-rank-label" style="color:${colors[r]};">${r}</div>
        <div class="score-count">${cnt}</div>
      </div>`).join('') + `</div>`;
}

// ─────────────────────────────────────────────
// Main render
// ─────────────────────────────────────────────
(async () => {
  await loadPublicArticles();

  const articles   = getPublicArticles();
  const companies  = getCompanySummaries();
  const themes     = getThemeSummaries();

  const mount = document.getElementById('dash-mount');

  // ── KPI ──────────────────────────────────
  const totalArts  = articles.length;
  const totalCos   = companies.filter(c => c.article_count > 0).length;
  const totalThemes= themes.filter(t => t.article_count > 0).length;
  const scores     = articles.map(a => Number(a.total_score)||0).filter(s => s > 0);
  const avgScore   = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';

  const now = new Date();
  const thisMonth = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisMonthCount = articles.filter(a => {
    const d = new Date(a.published_at || a.fetched_at || '');
    if (isNaN(d)) return false;
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}` === thisMonth;
  }).length;

  // ── Monthly (12ヶ月) ────────────────────
  const monthlyData = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    const shortLabel = `${d.getMonth()+1}月`;
    const cnt = articles.filter(a => {
      const ad = new Date(a.published_at || a.fetched_at || '');
      if (isNaN(ad)) return false;
      return `${ad.getFullYear()}/${String(ad.getMonth()+1).padStart(2,'0')}` === key;
    }).length;
    monthlyData.push({ label: shortLabel, value: cnt });
  }

  // ── Theme bar ────────────────────────────
  const themeBarData = themes
    .filter(t => t.article_count > 0)
    .slice(0, 10)
    .map(t => ({
      label: `${t.icon} ${t.name}`,
      value: t.article_count,
      color: t.accent,
      href: `theme.html?name=${encodeURIComponent(t.name)}`,
    }));

  // ── Industry bar ─────────────────────────
  const indMap = {};
  articles.forEach(a => {
    if (a.industry) indMap[a.industry] = (indMap[a.industry]||0)+1;
  });
  const indBarData = Object.entries(indMap)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 10)
    .map(([label, value]) => ({ label, value, color: '#40916c' }));

  // ── Company ranking ──────────────────────
  const topCos = companies
    .filter(c => c.article_count > 0)
    .slice(0, 15);

  // ── Score distribution ───────────────────
  const scoreDist = buildScoreDist(articles);

  // ── Latest articles ──────────────────────
  const latestArts = articles.slice(0, 5);
  const latestHtml = latestArts.length > 0
    ? latestArts.map(a => `
        <a href="article.html?slug=${a.slug}" style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--ink-100);text-decoration:none;" class="dash-latest-item">
          <div style="width:36px;height:36px;border-radius:var(--radius-sm);background:${
            (typeof CSR_TYPE_META!=='undefined'&&CSR_TYPE_META[a.csr_type]&&CSR_TYPE_META[a.csr_type].color)||'#d8f3dc'
          };display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">
            ${(typeof CSR_TYPE_META!=='undefined'&&CSR_TYPE_META[a.csr_type]&&CSR_TYPE_META[a.csr_type].icon)||'📋'}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:.82rem;font-weight:600;color:var(--ink-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.translated_title||a.title||''}</div>
            <div style="font-size:.7rem;color:var(--ink-400);">${a.company_name||''} · ${formatDate(a.published_at||a.fetched_at||'')}</div>
          </div>
        </a>`).join('')
    : `<div style="color:var(--ink-300);font-size:.84rem;padding:16px 0;text-align:center;">記事なし</div>`;

  // ── 更新時刻 ─────────────────────────────
  const src = getPublicDataSource();
  const srcLabel = src.source === 'sheets' ? 'Google Sheets リアルタイム' : 'ローカルデータ';
  const updatedHtml = `<div class="dash-updated">データソース: ${srcLabel} · ${new Date().toLocaleString('ja-JP')}</div>`;

  // ── Render ────────────────────────────────
  mount.innerHTML = `
    ${updatedHtml}

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card" style="--kpi-c:var(--green-500);">
        <div style="height:3px;background:var(--green-500);position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;"></div>
        <div class="kpi-num">${totalArts || '—'}</div>
        <div class="kpi-label">公開記事数</div>
        <div class="kpi-sub">累計</div>
      </div>
      <div class="kpi-card">
        <div style="height:3px;background:#40916c;position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;"></div>
        <div class="kpi-num" style="color:#40916c;">${totalCos || '—'}</div>
        <div class="kpi-label">掲載企業数</div>
        <div class="kpi-sub">ユドーク</div>
      </div>
      <div class="kpi-card">
        <div style="height:3px;background:#6b46c1;position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;"></div>
        <div class="kpi-num" style="color:#6b46c1;">${totalThemes || '—'}</div>
        <div class="kpi-label">テーマ数</div>
        <div class="kpi-sub">CSR大分類</div>
      </div>
      <div class="kpi-card">
        <div style="height:3px;background:#b5522a;position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;"></div>
        <div class="kpi-num" style="color:#b5522a;">${avgScore}</div>
        <div class="kpi-label">平均スコア</div>
        <div class="kpi-sub">25点満点</div>
      </div>
      <div class="kpi-card">
        <div style="height:3px;background:#1565c0;position:absolute;top:0;left:0;right:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0;"></div>
        <div class="kpi-num" style="color:#1565c0;">${thisMonthCount || '—'}</div>
        <div class="kpi-label">今月の掲載数</div>
        <div class="kpi-sub">${now.getMonth()+1}月</div>
      </div>
    </div>

    <!-- Monthly trend -->
    <div class="dash-card dash-section" style="margin-bottom:28px;">
      <div class="dash-section-title">
        月別掲載件数（直近12ヶ月）
        <span class="dash-section-badge">推移</span>
      </div>
      ${buildMonthlyChart(monthlyData, 'var(--green-500)')}
    </div>

    <!-- 2-col: Theme + Industry -->
    <div class="dash-cols">
      <div class="dash-card">
        <div class="dash-section-title">
          テーマ別件数
          <span class="dash-section-badge">TOP${themeBarData.length}</span>
        </div>
        ${buildBarChart(themeBarData, { labelWidth: 110, unit: '件' })}
        ${themeBarData.length === 0 ? '' : `<div style="margin-top:12px;text-align:right;"><a href="themes.html" style="font-size:.78rem;color:var(--green-600);">テーマ一覧へ →</a></div>`}
      </div>

      <div class="dash-card">
        <div class="dash-section-title">
          業界別件数
          <span class="dash-section-badge">TOP${indBarData.length}</span>
        </div>
        ${buildBarChart(indBarData, { labelWidth: 110, unit: '件' })}
      </div>
    </div>

    <!-- 2-col: Company ranking + Score dist -->
    <div class="dash-cols">
      <div class="dash-card">
        <div class="dash-section-title">
          企業別掲載件数ランキング
          <span class="dash-section-badge">TOP${topCos.length}</span>
        </div>
        ${topCos.length === 0
          ? `<div style="color:var(--ink-300);font-size:.84rem;text-align:center;padding:24px 0;">データなし</div>`
          : topCos.map((c, i) => `
            <a href="company.html?name=${encodeURIComponent(c.company_name)}" class="ranking-item">
              <span class="rank-num ${i < 3 ? 'top3' : ''}">${i+1}</span>
              <span class="rank-icon">${c.icon||'🏢'}</span>
              <div class="rank-info">
                <div class="rank-name">${c.company_name}</div>
                <div class="rank-sub">${c.industry||''}</div>
              </div>
              <span class="rank-count">${c.article_count}件</span>
            </a>`).join('')
        }
        ${topCos.length > 0 ? `<div style="margin-top:8px;text-align:right;"><a href="companies.html" style="font-size:.78rem;color:var(--green-600);">企業一覧へ →</a></div>` : ''}
      </div>

      <div>
        <!-- Score dist -->
        <div class="dash-card" style="margin-bottom:24px;">
          <div class="dash-section-title">
            スコア分布
            <span class="dash-section-badge">${articles.length}件</span>
          </div>
          ${articles.length === 0
            ? `<div style="color:var(--ink-300);font-size:.84rem;text-align:center;padding:16px 0;">データなし</div>`
            : scoreDist
          }
          <div style="margin-top:10px;font-size:.72rem;color:var(--ink-300);text-align:center;">
            S:22+ &nbsp; A:18-21 &nbsp; B:13-17 &nbsp; C:8-12 &nbsp; D:0-7
          </div>
        </div>

        <!-- Latest articles -->
        <div class="dash-card">
          <div class="dash-section-title">
            最新掲載記事
            <span class="dash-section-badge">${latestArts.length}件</span>
          </div>
          ${latestHtml}
          ${latestArts.length > 0 ? `<div style="margin-top:8px;text-align:right;"><a href="articles.html" style="font-size:.78rem;color:var(--green-600);">記事一覧へ →</a></div>` : ''}
        </div>
      </div>
    </div>
  `;

  // hover animation for latest items
  document.querySelectorAll('.dash-latest-item').forEach(el => {
    el.addEventListener('mouseenter', () => { el.style.background = 'var(--green-50)'; });
    el.addEventListener('mouseleave', () => { el.style.background = ''; });
  });

  initScrollAnimations();
})();
</script>
</body>
</html>
