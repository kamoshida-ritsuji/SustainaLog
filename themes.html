<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テーマ別 — SustainaLog</title>
  <meta name="description" content="CSR・サステナビリティ活動をテーマ別に探せます。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:title" content="テーマ別 — SustainaLog">
  <meta property="og:description" content="CSR・サステナビリティ活動をテーマ別に探せます。環境・地域貢献・教育支援ほか全11テーマ。">
  <meta property="og:site_name" content="SustainaLog">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .themes-grid-main {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) { .themes-grid-main { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .themes-grid-main { grid-template-columns: 1fr; } }
    .theme-card-big {
      background: var(--white);
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      text-decoration: none;
      display: block;
    }
    .theme-card-big:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--green-300);
    }
    .theme-card-header {
      padding: 24px 22px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .theme-icon-big {
      width: 56px; height: 56px;
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; flex-shrink: 0;
    }
    .theme-card-title {
      font-family: var(--font-serif);
      font-size: 1.05rem; color: var(--ink-900); margin-bottom: 6px;
    }
    .theme-card-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      font-size: .78rem; color: var(--ink-400);
    }
    .theme-card-count {
      font-family: var(--font-mono); font-weight: 700;
    }
    .theme-score-badge {
      font-family: var(--font-mono); font-size: .72rem;
      padding: 2px 8px; border-radius: 99px;
      background: var(--ink-50, #f9f9f9); color: var(--ink-400);
    }
    .theme-card-footer {
      padding: 12px 22px 16px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid var(--ink-100);
    }
    .theme-company-pills {
      display: flex; flex-wrap: wrap; gap: 4px; padding: 0 22px 16px;
    }
    .theme-company-pill {
      font-size: .7rem; padding: 2px 8px; border-radius: 99px;
      background: var(--cream); color: var(--ink-500);
      border: 1px solid var(--ink-100);
    }
    .stat-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 40px;
    }
    @media (max-width: 560px) { .stat-row { gap: 8px; } }
    .stat-box {
      background: var(--white); border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg); padding: 18px 14px; text-align: center;
    }
    .stat-box-num { font-family: var(--font-serif); font-size: 1.8rem; color: var(--green-700); line-height: 1; margin-bottom: 5px; }
    .stat-box-label { font-size: .76rem; color: var(--ink-400); }
  </style>
</head>
<body>

<div id="header-mount"></div>

<div class="page-hero">
  <div class="container">
    <p class="page-hero-label">Themes</p>
    <h1>テーマから探す</h1>
    <p>CSR大分類ごとに企業活動を整理・比較できます。</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- Stats -->
    <div class="stat-row">
      <div class="stat-box"><div class="stat-box-num" id="stat-themes">—</div><div class="stat-box-label">テーマ数</div></div>
      <div class="stat-box"><div class="stat-box-num" id="stat-arts">—</div><div class="stat-box-label">公開記事数</div></div>
      <div class="stat-box"><div class="stat-box-num" id="stat-cos">—</div><div class="stat-box-label">掲載企業数</div></div>
    </div>

    <!-- Search -->
    <div class="search-wrap" style="max-width:320px;margin-bottom:36px;">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="search-input" placeholder="テーマ名で検索..." id="themeSearch" oninput="filterThemes()">
    </div>

    <!-- Themes grid -->
    <div id="themes-grid">
      <div style="text-align:center;padding:64px 0;">
        <div style="width:36px;height:36px;border:3px solid var(--ink-100);border-top-color:var(--green-500);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div>
        <p style="color:var(--ink-300);font-size:.88rem;">テーマデータを読み込み中...</p>
      </div>
    </div>

    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-state-icon">🌿</div>
      <h3>テーマが見つかりません</h3>
      <p>検索条件を変えてお試しください。</p>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="schema.js"></script>
<script src="dummy-data.js"></script>
<script src="sheets-api.js"></script>
<script src="public-data.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderHeader('themes.html');
document.getElementById('footer-mount').innerHTML = renderFooter();

let _allThemes = [];
let _loaded = false;

function scoreColor(s) {
  if (s >= 22) return '#6a1fd1'; if (s >= 18) return '#1565c0';
  if (s >= 13) return '#2e7d32'; if (s >= 8)  return '#f57c00';
  return '#c62828';
}
function scoreLabel(s) {
  if (s >= 22) return 'S'; if (s >= 18) return 'A';
  if (s >= 13) return 'B'; if (s >= 8)  return 'C'; return 'D';
}

function renderThemeGrid(list) {
  const grid  = document.getElementById('themes-grid');
  const empty = document.getElementById('empty-state');
  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.className = 'themes-grid-main';
  grid.innerHTML = list.map(t => {
    const nameEnc = encodeURIComponent(t.name);
    const rank    = t.avg_score > 0 ? scoreLabel(t.avg_score) : '';
    const rankCol = t.avg_score > 0 ? scoreColor(t.avg_score) : '';
    const cosSlice = t.companies.slice(0, 4);
    const moreCount = t.companies.length - cosSlice.length;
    return `
      <a href="theme.html?name=${nameEnc}" class="theme-card-big animate-in">
        <div class="theme-card-header">
          <div class="theme-icon-big" style="background:${t.color};color:${t.accent};">${t.icon}</div>
          <div style="flex:1;min-width:0;">
            <h3 class="theme-card-title">${t.name}</h3>
            <div class="theme-card-meta">
              <span class="theme-card-count" style="color:${t.accent};">${t.article_count}件の記事</span>
              ${rank ? `<span class="theme-score-badge" style="color:${rankCol};background:${t.color};">平均${rank}(${t.avg_score}点)</span>` : ''}
              <span>${t.companies.length}社</span>
            </div>
          </div>
        </div>
        ${cosSlice.length > 0 ? `
        <div class="theme-company-pills">
          ${cosSlice.map(c => `<span class="theme-company-pill">${c}</span>`).join('')}
          ${moreCount > 0 ? `<span class="theme-company-pill">+${moreCount}</span>` : ''}
        </div>` : ''}
        <div class="theme-card-footer">
          <span style="font-size:.78rem;color:var(--ink-400);">
            ${t.latest_date ? formatDate(t.latest_date) + ' 更新' : '記事なし'}
          </span>
          <span style="font-size:.82rem;font-weight:700;color:${t.accent};">詳細を見る →</span>
        </div>
      </a>
    `;
  }).join('');
  initScrollAnimations();
}

function filterThemes() {
  if (!_loaded) return;
  const q = (document.getElementById('themeSearch').value || '').toLowerCase();
  const filtered = q
    ? _allThemes.filter(t => t.name.toLowerCase().includes(q))
    : _allThemes;
  renderThemeGrid(filtered);
}

(async () => {
  await loadPublicArticles();
  _allThemes = getThemeSummaries();
  _loaded = true;

  // Stats
  const totalArts = _allThemes.reduce((s, t) => s + t.article_count, 0);
  const allCos    = new Set(_allThemes.flatMap(t => t.companies));
  document.getElementById('stat-themes').textContent = _allThemes.filter(t => t.article_count > 0).length || _allThemes.length;
  document.getElementById('stat-arts').textContent   = totalArts || '—';
  document.getElementById('stat-cos').textContent    = allCos.size || '—';

  renderThemeGrid(_allThemes);
})();
</script>
</body>
</html>
