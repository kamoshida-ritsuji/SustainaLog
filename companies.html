<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業別 — SustainaLog</title>
  <meta name="description" content="CSR・サステナビリティ活動を業界・企業別に探せます。">
  <link rel="stylesheet" href="style.css">
  <style>
    .industry-section { margin-bottom: 56px; }
    .industry-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--green-100);
    }
    .industry-badge {
      background: var(--green-100);
      color: var(--green-700);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
    }
    .industry-title {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--ink-900);
    }
    .company-list-card {
      background: var(--white);
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .company-list-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--green-300);
    }
    .company-list-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-md);
      background: var(--green-50);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .company-list-info { flex: 1; min-width: 0; }
    .company-list-name { font-weight: 700; font-size: 0.95rem; color: var(--ink-900); margin-bottom: 3px; }
    .company-list-sub { font-size: 0.8rem; color: var(--ink-300); }
    .company-list-count {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--green-600);
      background: var(--green-50);
      padding: 4px 10px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .company-list-arrow { color: var(--ink-200); font-size: 1rem; transition: transform var(--transition); }
    .company-list-card:hover .company-list-arrow { transform: translateX(4px); color: var(--green-600); }
    .coming-soon-overlay {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink-300);
      background: var(--cream);
      border: 1.5px dashed var(--ink-100);
      padding: 6px 12px;
      border-radius: 99px;
    }
  </style>
</head>
<body>

<div id="header-mount"></div>

<div class="page-hero">
  <div class="container">
    <p class="page-hero-label">Companies</p>
    <h1>企業から探す</h1>
    <p>業界・企業別にCSR・サステナビリティ活動を追跡できます。</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- Stats Bar -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px;">
      ${[
        {num:'87', label:'掲載企業数'},
        {num:'18', label:'業界カテゴリ'},
        {num:'248', label:'収録記事数'},
        {num:'毎日', label:'情報更新'},
      ].map(s=>`
        <div style="background:var(--white);border:1px solid var(--ink-100);border-radius:var(--radius-lg);padding:20px;text-align:center;">
          <div style="font-family:var(--font-serif);font-size:1.8rem;color:var(--green-700);margin-bottom:4px;">${s.num}</div>
          <div style="font-size:0.8rem;color:var(--ink-300);">${s.label}</div>
        </div>
      `).join('')}
    </div>

    <!-- Search -->
    <div class="search-wrap" style="max-width:360px;margin-bottom:40px;">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="search-input" placeholder="企業名で検索..." id="companySearch" oninput="filterCompanies()">
    </div>

    <!-- Companies by Industry -->
    <div id="companies-by-industry"></div>

    <!-- Coming Soon Banner -->
    <div style="background:var(--green-50);border:1px solid var(--green-200);border-radius:var(--radius-xl);padding:40px;text-align:center;margin-top:32px;">
      <p style="font-size:1.5rem;margin-bottom:12px;">🚀</p>
      <h3 style="font-family:var(--font-serif);font-size:1.2rem;color:var(--green-800);margin-bottom:8px;">企業別詳細ページを準備中</h3>
      <p style="font-size:0.88rem;color:var(--ink-500);">各企業のサステナビリティ活動履歴・スコア・トレンドグラフなどを掲載予定です。</p>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="data.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderHeader('companies.html');
document.getElementById('footer-mount').innerHTML = renderFooter();

const COMPANIES_EXTENDED = [
  { name: "トヨタ自動車",             industry: "自動車",         count: 12, icon: "🚗", listed: "東証プライム", code: "7203" },
  { name: "本田技研工業",             industry: "自動車",         count: 8,  icon: "🏍️", listed: "東証プライム", code: "7267" },
  { name: "日産自動車",               industry: "自動車",         count: 6,  icon: "🚙", listed: "東証プライム", code: "7201" },
  { name: "ソニーグループ",           industry: "電機・精密機器", count: 9,  icon: "🎮", listed: "東証プライム", code: "6758" },
  { name: "パナソニックHD",           industry: "電機・精密機器", count: 8,  icon: "⚡", listed: "東証プライム", code: "6752" },
  { name: "富士フイルムHD",           industry: "電機・精密機器", count: 5,  icon: "📸", listed: "東証プライム", code: "4901" },
  { name: "みずほFG",                 industry: "金融・銀行",     count: 6,  icon: "🏦", listed: "東証プライム", code: "8411" },
  { name: "三菱UFJ FG",              industry: "金融・銀行",     count: 7,  icon: "🏛️", listed: "東証プライム", code: "8306" },
  { name: "NTTグループ",              industry: "通信・IT",       count: 11, icon: "📡", listed: "東証プライム", code: "9432" },
  { name: "ソフトバンクグループ",     industry: "通信・IT",       count: 7,  icon: "📱", listed: "東証プライム", code: "9984" },
  { name: "アサヒグループHD",         industry: "食品・飲料",     count: 4,  icon: "🍺", listed: "東証プライム", code: "2502" },
  { name: "キリンホールディングス",   industry: "食品・飲料",     count: 5,  icon: "🍻", listed: "東証プライム", code: "2503" },
  { name: "ファミリーマート",         industry: "小売・コンビニ", count: 5,  icon: "🏪", listed: "伊藤忠傘下",   code: "—" },
  { name: "イオングループ",           industry: "小売・コンビニ", count: 6,  icon: "🛒", listed: "東証プライム", code: "8267" },
  { name: "リクルートHD",             industry: "サービス・HR",   count: 7,  icon: "💼", listed: "東証プライム", code: "6098" },
  { name: "電通グループ",             industry: "サービス・HR",   count: 3,  icon: "📢", listed: "東証プライム", code: "4324" },
];

function filterCompanies() {
  const q = document.getElementById('companySearch').value.toLowerCase();
  const filtered = q
    ? COMPANIES_EXTENDED.filter(c => c.name.toLowerCase().includes(q) || c.industry.toLowerCase().includes(q))
    : COMPANIES_EXTENDED;
  renderByIndustry(filtered);
}

function renderByIndustry(list) {
  const industries = [...new Set(list.map(c => c.industry))];
  const container = document.getElementById('companies-by-industry');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🌿</div><h3>企業が見つかりません</h3><p>検索条件を変えてお試しください。</p></div>`;
    return;
  }
  container.innerHTML = industries.map(ind => {
    const comps = list.filter(c => c.industry === ind);
    return `
      <div class="industry-section animate-in">
        <div class="industry-header">
          <h2 class="industry-title">${ind}</h2>
          <span class="industry-badge">${comps.length}社</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;">
          ${comps.map(c => `
            <a href="articles.html" class="company-list-card">
              <div class="company-list-icon">${c.icon}</div>
              <div class="company-list-info">
                <div class="company-list-name">${c.name}</div>
                <div class="company-list-sub">${c.listed} ${c.code !== '—' ? c.code : ''}</div>
              </div>
              <span class="company-list-count">${c.count}件</span>
              <span class="company-list-arrow">→</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
  initScrollAnimations();
}

filterCompanies();
</script>
</body>
</html>
