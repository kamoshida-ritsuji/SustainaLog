<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業別 — SustainaLog</title>
  <meta name="description" content="国内上場企業のCSR・サステナビリティ活動を企業・業界別に探せます。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <meta property="og:type" content="website">
  <meta property="og:title" content="企業別 — SustainaLog">
  <meta property="og:description" content="国内上場企業のCSR・サステナビリティ活動を企業・業界別に探せます。">
  <meta property="og:site_name" content="SustainaLog">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .industry-section { margin-bottom: 52px; }
    .industry-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 2px solid var(--green-100);
    }
    .industry-badge {
      background: var(--green-100); color: var(--green-700);
      font-size: 0.75rem; font-weight: 700;
      padding: 3px 10px; border-radius: 99px;
    }
    .industry-title { font-family: var(--font-serif); font-size: 1.25rem; color: var(--ink-900); }
    .company-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (max-width: 640px) { .company-grid { grid-template-columns: 1fr; } }
    .company-list-card {
      background: var(--white); border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg); padding: 16px 20px;
      display: flex; align-items: center; gap: 14px;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      text-decoration: none;
    }
    .company-list-card:hover {
      transform: translateY(-2px); box-shadow: var(--shadow-md);
      border-color: var(--green-300);
    }
    .company-list-icon {
      width: 48px; height: 48px; border-radius: var(--radius-md);
      background: var(--green-50); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .company-list-info { flex: 1; min-width: 0; }
    .company-list-name { font-weight: 700; font-size: 0.92rem; color: var(--ink-900); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .company-list-sub { font-size: 0.76rem; color: var(--ink-400); }
    .company-list-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .company-list-count {
      font-family: var(--font-mono); font-size: 0.78rem; font-weight: 700;
      color: var(--green-600); background: var(--green-50);
      padding: 3px 9px; border-radius: 99px;
    }
    .company-list-score {
      font-family: var(--font-mono); font-size: 0.72rem; color: var(--ink-300);
    }
    .stat-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 40px;
    }
    @media (max-width: 640px) { .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }
    .stat-box {
      background: var(--white); border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg); padding: 20px 16px; text-align: center;
    }
    .stat-box-num { font-family: var(--font-serif); font-size: 1.9rem; color: var(--green-700); line-height: 1; margin-bottom: 6px; }
    .stat-box-label { font-size: 0.78rem; color: var(--ink-400); }
  </style>
</head>
<body>

<div id="header-mount"></div>

<div class="page-hero">
  <div class="container">
    <p class="page-hero-label">Companies</p>
    <h1>企業から探す</h1>
    <p>業界・企業別にCSR・サステナビリティ活動を追跡できます。</p>
  </div>
</div>

<section class="section">
  <div class="container">

    <!-- Stats Bar -->
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-box-num" id="stat-cos">—</div><div class="stat-box-label">掲載企業数</div></div>
      <div class="stat-box"><div class="stat-box-num" id="stat-arts">—</div><div class="stat-box-label">公開記事数</div></div>
      <div class="stat-box"><div class="stat-box-num" id="stat-inds">—</div><div class="stat-box-label">業界カテゴリ</div></div>
    </div>

    <!-- Search -->
    <div class="search-wrap" style="max-width:360px;margin-bottom:36px;">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="search-input" placeholder="企業名・業界で検索..." id="companySearch" oninput="filterCompanies()">
    </div>

    <!-- Companies by Industry -->
    <div id="companies-by-industry">
      <div style="text-align:center;padding:64px 0;">
        <div style="width:36px;height:36px;border:3px solid var(--ink-100);border-top-color:var(--green-500);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div>
        <p style="color:var(--ink-300);font-size:.88rem;">企業データを読み込み中...</p>
      </div>
    </div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="schema.js"></script>
<script src="dummy-data.js"></script>
<script src="sheets-api.js"></script>
<script src="public-data.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('header-mount').innerHTML = renderHeader('companies.html');
document.getElementById('footer-mount').innerHTML = renderFooter();

let _allSummaries = [];
let _loaded = false;

function scoreToRankLabel(score) {
  if (score >= 22) return 'S';
  if (score >= 18) return 'A';
  if (score >= 13) return 'B';
  if (score >= 8)  return 'C';
  return 'D';
}
function scoreToRankColor(score) {
  if (score >= 22) return '#6a1fd1';
  if (score >= 18) return '#1565c0';
  if (score >= 13) return '#2e7d32';
  if (score >= 8)  return '#f57c00';
  return '#c62828';
}

function renderByIndustry(list) {
  const container = document.getElementById('companies-by-industry');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🌿</div><h3>企業が見つかりません</h3><p>検索条件を変えてお試しください。</p></div>`;
    return;
  }

  const industries = [...new Set(list.map(c => c.industry).filter(Boolean))];

  container.innerHTML = industries.map(ind => {
    const comps = list.filter(c => c.industry === ind);
    return `
      <div class="industry-section animate-in">
        <div class="industry-header">
          <h2 class="industry-title">${ind}</h2>
          <span class="industry-badge">${comps.length}社</span>
        </div>
        <div class="company-grid">
          ${comps.map(c => {
            const nameEnc = encodeURIComponent(c.company_name);
            const scoreLabel = c.avg_score > 0 ? `平均${scoreToRankLabel(c.avg_score)}（${c.avg_score}点）` : '';
            const ticker = c.ticker ? `${c.ticker} · ` : '';
            const market = (typeof MARKET_LABEL !== 'undefined' && MARKET_LABEL[c.market]) || c.market || '';
            return `
              <a href="company.html?name=${nameEnc}" class="company-list-card">
                <div class="company-list-icon">${c.icon || '🏢'}</div>
                <div class="company-list-info">
                  <div class="company-list-name">${c.company_name}</div>
                  <div class="company-list-sub">${ticker}${market}</div>
                </div>
                <div class="company-list-meta">
                  <span class="company-list-count">${c.article_count}件</span>
                  ${scoreLabel ? `<span class="company-list-score">${scoreLabel}</span>` : ''}
                </div>
              </a>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
  initScrollAnimations();
}

function filterCompanies() {
  if (!_loaded) return;
  const q = (document.getElementById('companySearch').value || '').toLowerCase();
  const filtered = q
    ? _allSummaries.filter(c =>
        c.company_name.toLowerCase().includes(q) ||
        (c.industry || '').toLowerCase().includes(q) ||
        (c.ticker || '').includes(q)
      )
    : _allSummaries;
  renderByIndustry(filtered);
}

(async () => {
  await loadPublicArticles();
  _allSummaries = getCompanySummaries();
  _loaded = true;

  // Stats
  const industries = new Set(_allSummaries.map(c => c.industry).filter(Boolean));
  const totalArts  = _allSummaries.reduce((s, c) => s + c.article_count, 0);
  document.getElementById('stat-cos').textContent  = _allSummaries.length || '—';
  document.getElementById('stat-arts').textContent = totalArts || '—';
  document.getElementById('stat-inds').textContent = industries.size || '—';

  filterCompanies();
})();
</script>
</body>
</html>
