name: Daily CSR News Collection
on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r sustainalog_collector/requirements.txt
      - name: Initialize DB
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: cd sustainalog_collector && python main.py --init
      - name: Run daily collection
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: cd sustainalog_collector && python main.py --daily
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sustainalog-data-${{ github.run_number }}
          path: sustainalog_collector/data/
          retention-days: 30
