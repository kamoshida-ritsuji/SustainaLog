name: Daily CSR News Collection

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas

      - name: Initialize DB
        run: |
          cd sustainalog_collector
          python main.py --init

      - name: Run daily collection
        run: |
          cd sustainalog_collector
          python main.py --daily

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sustainalog-data-${{ github.run_number }}
          path: sustainalog_collector/data/
          retention-days: 30
