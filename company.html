<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企業詳細 — SustainaLog</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .co-hero { background: var(--green-900); padding: 48px 0 0; }
    .co-hero-inner { display: flex; align-items: flex-end; gap: 24px; padding-bottom: 40px; flex-wrap: wrap; }
    .co-icon-wrap { width: 80px; height: 80px; border-radius: var(--radius-lg); background: rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; font-size: 2.6rem; flex-shrink: 0; }
    .co-hero-body { flex: 1; min-width: 0; }
    .co-hero-eyebrow { font-size: .75rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green-400); margin-bottom: 8px; }
    .co-hero-name { font-family: var(--font-serif); font-size: clamp(1.5rem, 4vw, 2.2rem); color: var(--cream); line-height: 1.2; margin-bottom: 10px; }
    .co-hero-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .co-hero-tag { font-size: .75rem; font-weight: 600; padding: 4px 12px; border-radius: 99px; background: rgba(255,255,255,.12); color: var(--green-200); }
    .co-stats { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--ink-100); overflow: hidden; margin-top: -1px; }
    @media (max-width: 600px) { .co-stats { grid-template-columns: repeat(2, 1fr); } }
    .co-stat { padding: 20px 16px; text-align: center; border-right: 1px solid var(--ink-100); }
    .co-stat:last-child { border-right: none; }
    .co-stat-num { font-family: var(--font-serif); font-size: 1.8rem; color: var(--green-700); line-height: 1; margin-bottom: 6px; }
    .co-stat-label { font-size: .75rem; color: var(--ink-400); }
    .co-layout { display: grid; grid-template-columns: 1fr 300px; gap: 32px; margin-top: 40px; }
    @media (max-width: 900px) { .co-layout { grid-template-columns: 1fr; } }
    .co-section-title { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-300); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--ink-100); }
    .theme-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .theme-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 99px; font-size: .8rem; font-weight: 600; cursor: default; }
    .co-sidebar-card { background: var(--white); border: 1px solid var(--ink-100); border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 20px; }
    .co-sidebar-title { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 14px; }
    .co-data-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--ink-100); font-size: .83rem; gap: 12px; }
    .co-data-row:last-child { border-bottom: none; }
    .co-data-label { color: var(--ink-400); font-weight: 600; flex-shrink: 0; }
    .co-data-value { color: var(--ink-700); text-align: right; word-break: break-all; }
    .co-score-bar { height: 6px; background: var(--ink-100); border-radius: 3px; overflow: hidden; margin: 4px 0 2px; }
    .co-score-fill { height: 100%; border-radius: 3px; }
    .co-link-btn { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border: 1px solid var(--ink-100); border-radius: var(--radius-md); font-size: .82rem; font-weight: 600; color: var(--green-700); background: var(--green-50); transition: all var(--transition); margin-bottom: 8px; text-decoration: none; }
    .co-link-btn:hover { border-color: var(--green-400); background: var(--green-100); }
    .co-link-btn:last-child { margin-bottom: 0; }
    .activity-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .activity-label { font-size: .75rem; color: var(--ink-500); width: 60px; flex-shrink: 0; }
    .activity-track { flex: 1; height: 6px; background: var(--ink-100); border-radius: 3px; overflow: hidden; }
    .activity-fill { height: 100%; background: var(--green-400); border-radius: 3px; }
    .activity-count { font-size: .72rem; font-family: var(--font-mono); color: var(--ink-300); width: 28px; text-align: right; }
    .co-back { display: inline-flex; align-items: center; gap: 6px; font-size: .84rem; color: var(--green-400); margin-bottom: 24px; transition: gap var(--transition); }
    .co-back:hover { gap: 10px; color: var(--green-300); }
  </style>
</head>
